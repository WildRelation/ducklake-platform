<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Java Datalake Klient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .header { background: #20232a; color: white; padding: 32px 0; margin-bottom: 32px; }
    </style>
</head>
<body>

<div class="header">
    <div class="container">
        <h1>☕ Java Datalake Klient</h1>
        <p class="text-muted mb-0">Kommunicerar med datalaken via HTTP — GET, POST och DELETE</p>
    </div>
</div>

<div class="container pb-5">

    <div th:if="${fel}" class="alert alert-danger" th:text="${fel}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <!-- Lägg till kund -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title">Lägg till kund <span class="badge bg-warning text-dark">POST + X-API-Key</span></h5>
            <form method="post" action="/kunder" class="row g-2 mt-1">
                <div class="col-md-3">
                    <input type="text" name="namn" class="form-control" placeholder="Namn" required>
                </div>
                <div class="col-md-3">
                    <input type="email" name="email" class="form-control" placeholder="E-post" required>
                </div>
                <div class="col-md-3">
                    <input type="text" name="telefon" class="form-control" placeholder="Telefon (valfritt)">
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">Lägg till</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Kundlista -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="px-4 py-3 border-bottom d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Kunder <span class="badge bg-success">GET /api/kunder</span></h5>
                <span class="text-muted small"
                      th:text="${kunder != null ? kunder.size() + ' kunder' : ''}"></span>
            </div>
            <table class="table table-striped table-hover mb-0" th:if="${kunder != null}">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th><th>Namn</th><th>E-post</th><th>Telefon</th><th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="k : ${kunder}">
                        <td th:text="${k.id}"></td>
                        <td th:text="${k.namn}"></td>
                        <td th:text="${k.email}"></td>
                        <td th:text="${k.telefon ?: ''}"></td>
                        <td>
                            <form th:action="@{/kunder/{id}/radera(id=${k.id})}" method="post">
                                <button class="btn btn-sm btn-danger">
                                    Radera <span class="badge bg-light text-dark">DELETE</span>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
