<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Arial, sans-serif">
  <!-- Bakgrund -->
  <rect width="900" height="580" fill="#f0f4f8" rx="16"/>

  <!-- Titel -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a202c">Butik-API — Systemarkitektur</text>
  <text x="450" y="64" text-anchor="middle" font-size="13" fill="#718096">FastAPI · DuckLake · Docker · GitHub Actions · KTH Cloud</text>

  <!-- ═══ SEKTION: Lokal dator ═══ -->
  <rect x="20" y="85" width="240" height="200" rx="12" fill="#ebf8ff" stroke="#3182ce" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="140" y="107" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6cb0">💻 Din dator</text>

  <rect x="40" y="118" width="200" height="44" rx="8" fill="#3182ce"/>
  <text x="140" y="135" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Python-kod</text>
  <text x="140" y="152" text-anchor="middle" font-size="11" fill="#bee3f8">main.py · database.py</text>

  <rect x="40" y="172" width="200" height="44" rx="8" fill="#3182ce"/>
  <text x="140" y="189" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Dockerfile</text>
  <text x="140" y="206" text-anchor="middle" font-size="11" fill="#bee3f8">Containerpaketerar appen</text>

  <rect x="40" y="226" width="200" height="44" rx="8" fill="#3182ce"/>
  <text x="140" y="243" text-anchor="middle" font-size="12" fill="white" font-weight="bold">git push</text>
  <text x="140" y="260" text-anchor="middle" font-size="11" fill="#bee3f8">Skickar kod till GitHub</text>

  <!-- ═══ SEKTION: GitHub ═══ -->
  <rect x="320" y="85" width="240" height="200" rx="12" fill="#f0fff4" stroke="#38a169" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="440" y="107" text-anchor="middle" font-size="13" font-weight="bold" fill="#276749">🐙 GitHub</text>

  <rect x="340" y="118" width="200" height="44" rx="8" fill="#38a169"/>
  <text x="440" y="135" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Repo: butik-api</text>
  <text x="440" y="152" text-anchor="middle" font-size="11" fill="#c6f6d5">WildRelation/butik-api</text>

  <rect x="340" y="172" width="200" height="44" rx="8" fill="#38a169"/>
  <text x="440" y="189" text-anchor="middle" font-size="12" fill="white" font-weight="bold">GitHub Actions</text>
  <text x="440" y="206" text-anchor="middle" font-size="11" fill="#c6f6d5">Bygger Docker-image</text>

  <rect x="340" y="226" width="200" height="44" rx="8" fill="#38a169"/>
  <text x="440" y="243" text-anchor="middle" font-size="12" fill="white" font-weight="bold">GHCR</text>
  <text x="440" y="260" text-anchor="middle" font-size="11" fill="#c6f6d5">ghcr.io/wildrelation/butik-api</text>

  <!-- ═══ SEKTION: KTH Cloud ═══ -->
  <rect x="620" y="85" width="258" height="200" rx="12" fill="#fff5f5" stroke="#e53e3e" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="749" y="107" text-anchor="middle" font-size="13" font-weight="bold" fill="#c53030">☁️ KTH Cloud</text>

  <rect x="640" y="118" width="218" height="44" rx="8" fill="#e53e3e"/>
  <text x="749" y="135" text-anchor="middle" font-size="12" fill="white" font-weight="bold">misty-abnormally-educated</text>
  <text x="749" y="152" text-anchor="middle" font-size="11" fill="#fed7d7">FastAPI-app · port 8000</text>

  <rect x="640" y="172" width="218" height="44" rx="8" fill="#e53e3e"/>
  <text x="749" y="189" text-anchor="middle" font-size="12" fill="white" font-weight="bold">DuckLake</text>
  <text x="749" y="206" text-anchor="middle" font-size="11" fill="#fed7d7">katalog.duckdb + Parquet</text>

  <rect x="640" y="226" width="218" height="44" rx="8" fill="#e53e3e"/>
  <text x="749" y="243" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Persistent Storage</text>
  <text x="749" y="260" text-anchor="middle" font-size="11" fill="#fed7d7">/app/data (ducklake-data)</text>

  <!-- ═══ PILAR mellan sektioner ═══ -->
  <!-- Lokal → GitHub -->
  <line x1="261" y1="185" x2="318" y2="185" stroke="#4a5568" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="289" y="178" text-anchor="middle" font-size="10" fill="#4a5568">push</text>

  <!-- GitHub → KTH Cloud -->
  <line x1="561" y1="185" x2="618" y2="185" stroke="#4a5568" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="590" y="178" text-anchor="middle" font-size="10" fill="#4a5568">pull image</text>

  <!-- ═══ SEKTION: Webbläsare (användare) ═══ -->
  <rect x="300" y="340" width="290" height="100" rx="12" fill="#fffff0" stroke="#d69e2e" stroke-width="2"/>
  <text x="445" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#744210">🌐 Användare</text>
  <rect x="320" y="378" width="250" height="44" rx="8" fill="#d69e2e"/>
  <text x="445" y="395" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Webbläsare</text>
  <text x="445" y="412" text-anchor="middle" font-size="11" fill="#fefcbf">misty-abnormally-educated.app...</text>

  <!-- Pil: Användare → KTH Cloud -->
  <line x1="591" y1="400" x2="748" y2="291" stroke="#d69e2e" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-gold)"/>
  <text x="690" y="360" text-anchor="middle" font-size="10" fill="#744210">HTTPS</text>

  <!-- ═══ SEKTION: DuckLake förklaring ═══ -->
  <rect x="20" y="340" width="255" height="210" rx="12" fill="#faf5ff" stroke="#805ad5" stroke-width="2"/>
  <text x="147" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#553c9a">🦆 DuckLake — Hur det fungerar</text>

  <rect x="35" y="375" width="225" height="34" rx="6" fill="#805ad5"/>
  <text x="147" y="393" text-anchor="middle" font-size="11" fill="white">katalog.duckdb (metadata)</text>

  <text x="147" y="423" text-anchor="middle" font-size="18" fill="#805ad5">↓</text>

  <rect x="35" y="432" width="225" height="34" rx="6" fill="#9f7aea"/>
  <text x="147" y="450" text-anchor="middle" font-size="11" fill="white">lake/main/kunder/*.parquet</text>

  <rect x="35" y="472" width="225" height="34" rx="6" fill="#9f7aea"/>
  <text x="147" y="490" text-anchor="middle" font-size="11" fill="white">lake/main/produkter/*.parquet</text>

  <rect x="35" y="512" width="225" height="34" rx="6" fill="#9f7aea"/>
  <text x="147" y="530" text-anchor="middle" font-size="11" fill="white">lake/main/ordrar/*.parquet</text>

  <!-- ═══ SEKTION: CI/CD flöde ═══ -->
  <rect x="620" y="340" width="258" height="210" rx="12" fill="#fff8f1" stroke="#dd6b20" stroke-width="2"/>
  <text x="749" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b341e">🔄 CI/CD Flöde</text>

  <rect x="635" y="375" width="228" height="28" rx="6" fill="#dd6b20"/>
  <text x="749" y="393" text-anchor="middle" font-size="11" fill="white">1. git push → GitHub</text>

  <rect x="635" y="411" width="228" height="28" rx="6" fill="#dd6b20"/>
  <text x="749" y="429" text-anchor="middle" font-size="11" fill="white">2. GitHub Actions triggas</text>

  <rect x="635" y="447" width="228" height="28" rx="6" fill="#dd6b20"/>
  <text x="749" y="465" text-anchor="middle" font-size="11" fill="white">3. Docker-image byggs</text>

  <rect x="635" y="483" width="228" height="28" rx="6" fill="#dd6b20"/>
  <text x="749" y="501" text-anchor="middle" font-size="11" fill="white">4. Pushas till GHCR</text>

  <rect x="635" y="519" width="228" height="28" rx="6" fill="#dd6b20"/>
  <text x="749" y="537" text-anchor="middle" font-size="11" fill="white">5. Restart → live på KTH Cloud</text>

  <!-- Pilar-definitioner -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d69e2e"/>
    </marker>
  </defs>
</svg>
