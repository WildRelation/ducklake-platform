<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="520" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#20232a">Anslutning via HTTP — Python och Java mot DuckLake</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- CENTER: FastAPI + DuckLake -->
  <!-- ═══════════════════════════════════════════════════ -->

  <rect x="300" y="180" width="300" height="280" rx="12" fill="white" stroke="#28a745" stroke-width="2" stroke-dasharray="6"/>
  <text x="450" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="#28a745">misty-abnormally-educated (KTH Cloud)</text>

  <!-- FastAPI -->
  <rect x="325" y="195" width="250" height="60" rx="8" fill="#d1ecf1" stroke="#17a2b8" stroke-width="2"/>
  <text x="450" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#17a2b8">FastAPI</text>
  <text x="450" y="238" text-anchor="middle" font-size="10" fill="#444">REST API — port 8000</text>
  <text x="450" y="251" text-anchor="middle" font-size="10" fill="#888">GET /api/kunder  POST /api/kunder  DELETE ...</text>

  <!-- Arrow FastAPI → DuckDB -->
  <line x1="450" y1="255" x2="450" y2="295" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- DuckDB -->
  <rect x="340" y="295" width="220" height="55" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="450" y="318" text-anchor="middle" font-size="13" font-weight="bold" fill="#856404">DuckDB</text>
  <text x="450" y="336" text-anchor="middle" font-size="10" fill="#444">+ ducklake extension</text>

  <!-- Arrow DuckDB → Disk -->
  <line x1="450" y1="350" x2="450" y2="390" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Persistent disk -->
  <rect x="325" y="390" width="250" height="60" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="450" y="413" text-anchor="middle" font-size="12" font-weight="bold" fill="#155724">💾 Persistent volym</text>
  <text x="450" y="430" text-anchor="middle" font-size="10" fill="#444">katalog.duckdb + Parquet-filer</text>
  <text x="450" y="443" text-anchor="middle" font-size="10" fill="#888">/app/data</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEFT: Python klient -->
  <!-- ═══════════════════════════════════════════════════ -->

  <rect x="30" y="195" width="210" height="150" rx="10" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <rect x="30" y="195" width="210" height="35" rx="10" fill="#0d6efd"/>
  <rect x="30" y="218" width="210" height="12" fill="#0d6efd"/>
  <text x="135" y="217" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Python-klient</text>

  <rect x="50" y="248" width="170" height="45" rx="6" fill="#cfe2ff" stroke="#0d6efd" stroke-width="1"/>
  <text x="135" y="266" text-anchor="middle" font-size="11" font-weight="bold" fill="#0d6efd">requests.get()</text>
  <text x="135" y="281" text-anchor="middle" font-size="10" fill="#444">Python HTTP-bibliotek</text>

  <rect x="50" y="300" width="170" height="35" rx="6" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="135" y="313" text-anchor="middle" font-size="10" fill="#555">DATALAKE_URL =</text>
  <text x="135" y="326" text-anchor="middle" font-size="10" fill="#0d6efd">https://misty-...kth.se</text>

  <!-- Arrow Python → FastAPI -->
  <line x1="240" y1="270" x2="295" y2="240" stroke="#0d6efd" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <text x="258" y="248" text-anchor="middle" font-size="10" fill="#0d6efd" font-weight="bold">HTTP</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- RIGHT: Java klient -->
  <!-- ═══════════════════════════════════════════════════ -->

  <rect x="660" y="195" width="210" height="150" rx="10" fill="white" stroke="#dc3545" stroke-width="2"/>
  <rect x="660" y="195" width="210" height="35" rx="10" fill="#dc3545"/>
  <rect x="660" y="218" width="210" height="12" fill="#dc3545"/>
  <text x="765" y="217" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Java-klient</text>

  <rect x="680" y="248" width="170" height="45" rx="6" fill="#f8d7da" stroke="#dc3545" stroke-width="1"/>
  <text x="765" y="266" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc3545">HttpClient</text>
  <text x="765" y="281" text-anchor="middle" font-size="10" fill="#444">Java inbyggt (Java 11+)</text>

  <rect x="680" y="300" width="170" height="35" rx="6" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="765" y="313" text-anchor="middle" font-size="10" fill="#555">BASE_URL =</text>
  <text x="765" y="326" text-anchor="middle" font-size="10" fill="#dc3545">https://misty-...kth.se</text>

  <!-- Arrow Java → FastAPI -->
  <line x1="660" y1="270" x2="605" y2="240" stroke="#dc3545" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <text x="640" y="248" text-anchor="middle" font-size="10" fill="#dc3545" font-weight="bold">HTTP</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- HTTP Examples -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Python examples -->
  <rect x="30" y="370" width="210" height="110" rx="8" fill="#f0f7ff" stroke="#0d6efd" stroke-width="1"/>
  <text x="135" y="390" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d6efd">Kodexempel Python:</text>
  <text x="45" y="408" font-size="9" fill="#333">requests.get(URL+"/api/kunder")</text>
  <text x="45" y="423" font-size="9" fill="#333">requests.post(URL+"/api/kunder",</text>
  <text x="55" y="436" font-size="9" fill="#333">  json={...},</text>
  <text x="55" y="449" font-size="9" fill="#333">  headers={"X-API-Key": KEY})</text>
  <text x="45" y="464" font-size="9" fill="#333">requests.delete(URL+"/api/kunder/1",</text>
  <text x="55" y="477" font-size="9" fill="#333">  headers={"X-API-Key": KEY})</text>

  <!-- Java examples -->
  <rect x="660" y="370" width="210" height="110" rx="8" fill="#fff0f0" stroke="#dc3545" stroke-width="1"/>
  <text x="765" y="390" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc3545">Kodexempel Java:</text>
  <text x="675" y="408" font-size="9" fill="#333">HttpRequest.newBuilder()</text>
  <text x="675" y="423" font-size="9" fill="#333">  .uri(URI.create(URL+"/api/kunder"))</text>
  <text x="675" y="436" font-size="9" fill="#333">  .GET().build()</text>
  <text x="675" y="451" font-size="9" fill="#333">// POST kräver:</text>
  <text x="675" y="464" font-size="9" fill="#333">  .header("X-API-Key", KEY)</text>
  <text x="675" y="477" font-size="9" fill="#333">  .POST(BodyPublishers.ofString(json))</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Same API note -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="280" y="60" width="340" height="90" rx="10" fill="white" stroke="#6c757d" stroke-width="1.5"/>
  <text x="450" y="83" text-anchor="middle" font-size="12" font-weight="bold" fill="#20232a">Samma API — olika språk</text>
  <text x="450" y="103" text-anchor="middle" font-size="10" fill="#555">Både Python och Java skickar vanliga</text>
  <text x="450" y="118" text-anchor="middle" font-size="10" fill="#555">HTTP-anrop. FastAPI bryr sig inte om</text>
  <text x="450" y="133" text-anchor="middle" font-size="10" fill="#555">vilket språk klienten är skriven i.</text>

  <!-- Arrows from note to clients -->
  <line x1="280" y1="100" x2="240" y2="220" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4"/>
  <line x1="620" y1="100" x2="660" y2="220" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d6efd"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc3545"/>
    </marker>
  </defs>

</svg>
